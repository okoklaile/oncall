<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能 OnCall 助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/es/highlight.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg class="sidebar-logo-icon" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M12 8v4l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <h2 class="sidebar-title">OnCall</h2>
                </div>
                <div class="sidebar-status">
                    <span class="status-dot"></span>
                    <span class="status-label">系统在线</span>
                </div>
            </div>

            <div class="sidebar-content">
                <button class="new-chat-btn" id="newChatBtn">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span>新建对话</span>
                </button>

                <div class="chat-history-section">
                    <div class="history-header">
                        <span>近期对话</span>
                        <span class="history-count" id="historyCount">0</span>
                    </div>
                    <div class="chat-history-list" id="chatHistoryList"></div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="ai-ops-btn" id="aiOpsSidebarBtn">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    </svg>
                    <span>AI Ops 诊断</span>
                </button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="chat-container" id="chatContainer">
                <!-- 欢迎界面 -->
                <div class="welcome-greeting" id="welcomeGreeting">
                    <div class="welcome-icon">
                        <svg viewBox="0 0 40 40" fill="none">
                            <circle cx="20" cy="20" r="15" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
                            <path d="M20 12v8l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="20" cy="20" r="3" fill="currentColor" opacity="0.6"/>
                        </svg>
                    </div>
                    <div class="welcome-text">
                        <h1>智能 OnCall 助手</h1>
                        <p>企业级智能对话与运维诊断</p>
                    </div>
                    <div class="welcome-hints">
                        <div class="hint-chip">
                            <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
                                <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2"/>
                                <path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                            </svg>
                            <span>快速问答</span>
                        </div>
                        <div class="hint-chip">
                            <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
                                <path d="M2 4h12M2 8h12M2 12h8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                            </svg>
                            <span>流式对话</span>
                        </div>
                        <div class="hint-chip">
                            <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
                                <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                            </svg>
                            <span>AIOps 诊断</span>
                        </div>
                    </div>
                </div>

                <!-- 聊天消息区 -->
                <div class="chat-messages" id="chatMessages"></div>
            </div>

            <!-- 输入区域 -->
            <div class="chat-input-container">
                <div class="input-group-wrapper">
                    <div class="input-wrapper">
                        <!-- Terminal prompt indicator -->
                        <div class="input-prompt">
                            <span class="prompt-symbol">❯</span>
                        </div>
                        <input type="text" id="messageInput" placeholder="输入你的问题..." maxlength="1000" class="message-input" autofocus>
                        <div class="input-bottom-bar">
                            <div class="tools-btn-wrapper">
                                <button class="tools-btn" id="toolsBtn" title="更多选项">
                                    <svg viewBox="0 0 24 24" fill="none">
                                        <circle cx="12" cy="5" r="1.5" fill="currentColor"/>
                                        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                                        <circle cx="12" cy="19" r="1.5" fill="currentColor"/>
                                    </svg>
                                </button>
                                <div class="tools-menu" id="toolsMenu">
                                    <div class="tools-menu-item" id="uploadFileItem">
                                        <svg viewBox="0 0 24 24" fill="none">
                                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                        </svg>
                                        <span>上传文件</span>
                                    </div>
                                </div>
                            </div>
                            <div class="right-actions">
                                <div class="mode-selector-wrapper">
                                    <button class="mode-selector-btn" id="modeSelectorBtn">
                                        <svg class="mode-icon" viewBox="0 0 16 16" fill="none" width="14" height="14">
                                            <rect x="1" y="1" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.2"/>
                                            <path d="M5 8h6M8 5v6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                                        </svg>
                                        <span id="currentModeText">快速</span>
                                        <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none">
                                            <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </button>
                                    <div class="mode-dropdown" id="modeDropdown">
                                        <div class="dropdown-header">选择对话方式</div>
                                        <div class="dropdown-item active" data-mode="quick">
                                            <div class="dropdown-item-main">
                                                <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
                                                    <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                                                </svg>
                                                <span>快速</span>
                                                <span class="badge-new">新</span>
                                            </div>
                                            <div class="dropdown-item-sub">一次性快速对话</div>
                                        </div>
                                        <div class="dropdown-item" data-mode="stream">
                                            <div class="dropdown-item-main">
                                                <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
                                                    <path d="M3 12L7 4l4 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                                </svg>
                                                <span>流式</span>
                                            </div>
                                            <div class="dropdown-item-sub">实时流式对话</div>
                                        </div>
                                    </div>
                                </div>
                                <button class="send-btn" id="sendButton" title="发送">
                                    <svg viewBox="0 0 24 24" fill="none">
                                        <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <input type="file" id="fileInput" accept=".txt,.md,.markdown" style="display: none;">
            </div>
        </main>
    </div>

    <!-- 加载遮罩层 -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner">
                <div class="spinner-ring"></div>
            </div>
            <div class="loading-text">智能运维分析中，请稍候...</div>
            <div class="loading-subtext">后端正在处理，请耐心等待</div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
