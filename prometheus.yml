global:
  scrape_interval: 15s # 每15秒采集一次数据

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 采集另外一台电脑（目标机器）的指标
  - job_name: 'node'
    static_configs:
      # 请将下面的 IP 替换为你要监控的那台电脑的真实 IP
      # 如果那台是 Windows 电脑，端口默认是 9182
      # 如果那台是 Linux 电脑，端口默认是 9100
      - targets: ['10.112.181.216:9100']